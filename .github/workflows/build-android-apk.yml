name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Auto-increment version in app.json
        id: bump_version
        run: |
          node -e "
            const fs = require('fs');
            const app = require('./app.json');
            
            // Increment version string
            const currentVersion = app.expo.version || '1.0.0';
            const parts = currentVersion.split('.').map(Number);
            if (parts.length === 3) {
              parts[2] += 1;
            } else {
              parts.push(1);
            }
            const nextVersion = parts.join('.');
            app.expo.version = nextVersion;

            // Increment android versionCode
            if (!app.expo.android) {
              app.expo.android = {};
            }
            const currentVersionCode = app.expo.android.versionCode || 1;
            const nextVersionCode = currentVersionCode + 1;
            app.expo.android.versionCode = nextVersionCode;

            fs.writeFileSync('./app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('Next version calculated:', nextVersion);
            console.log('Next versionCode calculated:', nextVersionCode);
            
            // Output to environment for subsequent steps
            fs.appendFileSync(process.env.GITHUB_ENV, 'VERSION=' + nextVersion + '\n');
          "

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: pnpm install

      - name: Expo Prebuild (Generate Android folder)
        run: npx expo prebuild --platform android --clean

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Prepare APK Artifact
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk ClassScheduler.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: ClassScheduler v${{ env.VERSION }} (Android)
          body: |
            ## ClassScheduler v${{ env.VERSION }} (Android)
            
            ### Installation
            Download the `ClassScheduler.apk` file below and install it on your Android device.
          files: |
            ClassScheduler.apk
          draft: false
          prerelease: false

      - name: Commit updated app.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git stash
          git fetch origin main
          git rebase origin/main
          git stash pop
          git add app.json
          git diff --staged --quiet || git commit -m "chore: release Android v${VERSION} [skip ci]"
          git push origin main
